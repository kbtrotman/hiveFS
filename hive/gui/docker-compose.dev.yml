name: hive-dev

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: hive-backend-dev
    environment:
      # Django settings
      DJANGO_SETTINGS_MODULE: "src.config.settings"
      PYTHONUNBUFFERED: "1"
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      REDIS_CACHE_DB: "1"
      EVENTSTREAM_REDIS_DB: "0"

      # DB via unix socket (set these in an .env for convenience)
      DB_SOCKET_PATH: "${DB_SOCKET_PATH:-/run/mysqld/mysqld.sock}"

      # Optional: API base behind Vite proxy is /api
      # (frontend calls /api/v1/...)
    volumes:
      # Live code editing
      - ./backend:/app

      # Host sockets
      - /run/hive_bootstrap.sock:/run/hive_bootstrap.sock:rw
      - /run/mysqld/mysqld.sock:/run/mysqld/mysqld.sock:ro
    # Optional: expose backend only on localhost for debugging
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      - redis
    networks:
      - fe_be

  redis:
    image: redis:7-alpine
    container_name: hive-redis-dev
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    volumes:
      - redis-dev-data:/data
    networks:
      - fe_be

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend.dev
    container_name: hive-frontend-dev
    environment:
      NODE_ENV: development
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - fe_be

networks:
  fe_be:
    driver: bridge

volumes:
  redis-dev-data:
